<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Open an account — Ledger Bank</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="wrap narrow">
    <div class="card">
        <p class="page-sub" style="margin-bottom:2px; text-transform:uppercase; letter-spacing:0.08em; font-size:0.75rem; color:var(--brass); font-weight:600;">Ledger Bank</p>
        <h1 class="page-title">Open an account</h1>
        <p class="page-sub">Takes less than a minute.</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form method="post" th:action="@{/register}">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" name="fullName" required autofocus>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="username">Choose a username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Choose a password</label>
            <input type="password" id="password" name="password" required>

            <label for="accountType">Account type</label>
            <select id="accountType" name="accountType">
                <option value="SAVINGS">Savings</option>
                <option value="CURRENT">Current</option>
            </select>

            <button type="submit" class="btn btn-primary btn-block">Create account</button>
        </form>

        <p class="link-row">Already have an account? <a th:href="@{/login}">Sign in</a></p>
    </div>
</div>
</body>
</html>
