<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transfer — Ledger Bank</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar">
    <div class="brand"><span class="mark">L</span> Ledger Bank</div>
    <nav><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/logout}">Log out</a></nav>
</div>

<div class="wrap narrow">
    <h1 class="page-title">Transfer funds</h1>
    <p class="page-sub" th:text="'From ' + ${account.accountNumber}"></p>

    <div class="card">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <p style="color:var(--text-muted); font-size:0.85rem; margin:0;">Available balance</p>
        <p class="balance" style="font-size:1.8rem; margin-top:4px;">
            <small>$</small><span th:text="${#numbers.formatDecimal(account.balance, 1, 'COMMA', 2, 'POINT')}"></span>
        </p>

        <form method="post" th:action="@{'/account/' + ${account.id} + '/transfer'}">
            <label for="toAccountNumber">Recipient account number</label>
            <input type="text" id="toAccountNumber" name="toAccountNumber" placeholder="ACC1234567" required autofocus>

            <label for="amount">Amount</label>
            <input type="number" id="amount" name="amount" step="0.01" min="0.01" required>

            <button type="submit" class="btn btn-primary btn-block">Send transfer</button>
        </form>

        <p class="link-row"><a th:href="@{/dashboard}">← Back to dashboard</a></p>
    </div>
</div>
</body>
</html>
