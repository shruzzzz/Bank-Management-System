spring.application.name=bank-management-system

# H2 file-based database - creates a file called bankdb.mv.db in the project folder.
# Data persists between restarts (unlike an in-memory DB).
spring.datasource.url=jdbc:h2:file:./data/bankdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auto create/update tables from the @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:file:./data/bankdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
